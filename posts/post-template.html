<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Study AI with Rex</title>
    <!-- Add favicon links -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <!-- Existing styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/post.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
</head>
<body>
    <div id="header-container"></div>

    <main>
        <div class="post-container">
            <div class="hero-image"></div>
            <div class="post-header">
                <div class="post-meta">
                    <time class="post-date"></time>
                    <div class="tag-container">
                        <div class="topic-tags">
                            <a href="#" class="topic-tag"></a>
                        </div>
                        <a href="#" class="series-tag"></a>
                    </div>
                </div>
                <h1 class="post-title"></h1>
                <p class="post-description"></p>
            </div>
            <div class="post-content">
                <div class="loading-spinner" style="display: none;">Loading...</div>
                <!-- Content will be inserted here -->
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="../scripts/post-renderer.js"></script>
    <script>
        // lucide.createIcons();
    </script>
    
    <script src="../scripts/darkmode.js"></script>
    <script src="../scripts/loadComponents.js"></script>
    <script src="../scripts/transitions.js"></script>
</body>
</html>
