<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Study AI with Rex</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/post.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <a href="../" class="logo">Study AI with Rex</a>
        <nav class="nav-container">
            <div class="nav-items">
                <a href="../" class="nav-item">
                    <i data-lucide="book-open"></i>
                    <span>Blog</span>
                </a>
                <a href="../about.html" class="nav-item">
                    <i data-lucide="user"></i>
                    <span>About</span>
                </a>
                <a href="../contact.html" class="nav-item">
                    <i data-lucide="mail"></i>
                    <span>Contact</span>
                </a>
            </div>
            <div class="social-icons">
                <a href="https://x.com/HaHoang411" target="_blank">
                    <i data-lucide="twitter"></i>
                </a>
                <a href="https://www.linkedin.com/in/hoanghavn/" target="_blank">
                    <i data-lucide="linkedin"></i>
                </a>
                <a href="https://github.com/hahuyhoang411" target="_blank">
                    <i data-lucide="github"></i>
                </a>
            </div>
        </nav>
    </header>

    <main class="post-container">
        <div class="hero-image">
            <!-- Will be populated by JavaScript -->
        </div>

            <div class="post-metadata">
                <time class="post-date"></time>
                <h1 class="post-title"></h1>
                <div class="post-description"></div>
            </div>
        </div>
        <article class="post-content">
            <!-- Will be populated by JavaScript -->
        </article>
    </main>

    <footer>
        <p>© 2025 Study AI with Rex</p>
    </footer>

    <script src="../scripts/navigation.js"></script>
    <script src="../scripts/post-renderer.js"></script>
    <script>
        lucide.createIcons();
    </script>

</html>
