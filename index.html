<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study AI with Rex</title>
    <!-- Add favicon links -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <!-- Existing styles -->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="header-container"></div>

    <section class="hero">
        <div class="hero-quote">
            <blockquote>
                "Your inspiring quote about AI and healthcare innovation."
            </blockquote>
            <cite>– Visionary Thinker</cite>
        </div>
        <img src="assets/images/thumbnails/PharmaxAI.png" alt="PharmaxAI" class="hero-image">
    </section>
    
    <main>
        <div class="posts">
            <!-- Posts will be loaded here by scripts/postLoader.js -->
        </div>
    </main>

    <footer>
        <p>© <span id="copyright-year"></span> Study AI with Rex</p>
    </footer>
    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
    <!-- Add this before the closing body tag, after other scripts -->
    <script src="scripts/transitions.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/postLoader.js"></script>
    <script src="scripts/loadComponents.js"></script>
</body>
</html>
